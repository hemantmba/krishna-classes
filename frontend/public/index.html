  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif; background: #f8f4e8; }
    #root { min-height: 100vh; }
    :root {
      --gold: #b8860b;
      --gold-light: #d4a017;
      --gold-dark: #8b6508;
      --deep-blue: #1a237e;
      --navy: #0d1b4b;
      --white: #ffffff;
      --bg: #f8f4e8;
      --bg2: #fff9f0;
      --text: #1a1a2e;
      --text-muted: #666;
      --border: #e8d5a3;
      --success: #2e7d32;
      --error: #c62828;
      --shadow: 0 4px 20px rgba(184,134,11,0.15);
    }
    .loading-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--navy);
      flex-direction: column; gap: 16px;
    }
    .loading-logo { width: 100px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(0.95)} }
    .loading-text { color: var(--gold); font-family: 'Baloo 2'; font-size: 1.4rem; font-weight: 700; }
  </style>

  <div id="root">
