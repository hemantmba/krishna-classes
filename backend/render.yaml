services:
  - type: web
    name: krishna-classes-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_SCRIPT_URL
        sync: false
      - key: NODE_ENV
        value: production
